<style>
  :root{
    --bg:#eef1f6; --card:#ffffff; --ink:#171a21; --muted:#7a8494; --sub:#5c6472; --sub2:#3d4453;
    --line:#f1f3f7; --primary:#1f6bff; --primary-soft:#e7efff;

    --orange:#f79009; --orange-soft:#fdf0dc;

    --gray-soft:#e3e7ef;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;color:var(--ink);}
  #root{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;}
  button{font-family:inherit;border:none;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  input,textarea,select{font-family:inherit;}
  .tap{cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .tap:active{opacity:.7;}
  .scr::-webkit-scrollbar{display:none;}
  .card{background:var(--card);border-radius:20px;box-shadow:0 1px 3px rgba(20,25,40,.06);}
  .row-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;}
  .divider{height:1px;background:var(--line);margin:0 16px;}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
  .pill{font-size:12px;font-weight:700;padding:7px 14px;border-radius:20px;white-space:nowrap;}
  .spin{animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes slideUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet{animation:slideUp .22s ease-out;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .fadein{animation:fadeIn .15s ease-out;}
  #boot-error{display:none;position:fixed;inset:0;background:#fff;z-index:99999;padding:24px;font-family:-apple-system,sans-serif;color:#b91c1c;font-size:13px;line-height:1.6;white-space:pre-wrap;overflow:auto;}
</style>

  window.addEventListener('error', function (e) {
    var box = document.getElementById('boot-error');
